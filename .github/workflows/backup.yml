name: Database Backup

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # también ejecutable manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install pg
        run: npm install pg

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node - <<'EOF'
          const { Client } = require('pg');
          const fs = require('fs');

          const TABLES = ['users', 'heroes', 'camps', 'tile_claims', 'adventure_sessions', 'pvp_pending_removals', 'pvp_pending_loot'];

          async function main() {
            const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const filename = `backup_${timestamp}.json`;
            const backup = { timestamp, tables: {} };

            for (const table of TABLES) {
              try {
                const res = await client.query(`SELECT * FROM ${table}`);
                backup.tables[table] = res.rows;
                console.log(`  ${table}: ${res.rows.length} rows`);
              } catch (e) {
                console.log(`  ${table}: skipped (${e.message})`);
              }
            }

            await client.end();
            fs.writeFileSync(filename, JSON.stringify(backup));
            const kb = Math.round(fs.statSync(filename).size / 1024);
            console.log(`Backup guardado: ${filename} (${kb} KB)`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.json
          retention-days: 30
          if-no-files-found: error
