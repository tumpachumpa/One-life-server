name: Database Backup

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # también ejecutable manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%S")
          FILENAME="backup_${TIMESTAMP}.dump"
          pg_dump "$DATABASE_URL" -F c -f "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "Backup guardado: $FILENAME ($SIZE)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30   # GitHub guarda 30 días (plan free)
          if-no-files-found: error
